minimumLimaVersion: 2.0.0
base:
- template:_images/debian-13

vmOpts:
  qemu:
    cpuType:
      x86_64: "host"
      aarch64: "host"

nestedVirtualization: true

user:
  name: null
  comment: null
  uid: null
  home: "/home/{{.User}}"
  shell: null

cpus: 8
memory: "16GiB"
# "100GiB"
disk: null

mounts: []

ssh:
  loadDotSSHPubKeys: false
  forwardAgent: false
  forwardX11: false
  forwardX11Trusted: false
  overVsock: null

upgradePackages: true

containerd:
  system: false
  user: false

provision:
  # Common tools
  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get update
      apt-get install --no-install-recommends -y \
        git stow curl vim ca-certificates sudo xz-utils unzip build-essential \
        gnupg gpg-agent

