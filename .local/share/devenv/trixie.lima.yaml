  # Install docker
  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail
      export DEBIAN_FRONTEND=noninteractive

      if [[ -f /etc/lima-devenv/provisioned ]]; then exit 0; fi

      tee /etc/apt/sources.list.d/docker.sources <<EOF
      Types: deb
      URIs: https://download.docker.com/linux/debian
      Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
      Components: stable
      Architectures: $(dpkg --print-architecture)
      Signed-By: /etc/apt/keyrings/docker.asc
      EOF

      apt-get update
      apt-get install --no-install-recommends -y \
        docker-ce docker-ce-cli containerd.io \
        docker-buildx-plugin docker-compose-plugin

  # Install nix and shit
  - mode: user
    script: |
      #!/bin/bash
      set -euxo pipefail
      cd

      if ! [[ -d "./dotfiles" ]]; then
        git clone https://github.com/MrkMrk00/dotfiles --depth=1
        rm -f ~/.zshrc ~/.bashrc

        pushd dotfiles
          stow .
        popd
      fi

      if ! [[ -d /nix ]]; then
        sh <(curl -L https://nixos.org/nix/install) --daemon --yes
        sudo mkdir -p /etc/nix
        echo "experimental-features = nix-command flakes" | sudo tee /etc/nix/nix.conf
        echo 'PATH="$PATH:/nix/var/nix/profiles/default/bin:$HOME/.nix-profile/bin"' >> ~/.profile

        . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh

        sudo loginctl enable-linger "$(whoami)"
        sudo NIXPKGS_ALLOW_UNFREE=1 nix profile add \
          ~/dotfiles#default \
          --impure           \
          --profile /nix/var/nix/profiles/default

        nix run github:nix-community/home-manager -- switch \
          --flake ~/dotfiles#"$(whoami)"
      fi

      NIX_ZSH_PATH="/nix/var/nix/profiles/default/bin/zsh"

      # Add the Nix Zsh binary path to the system's valid shells registry
      # and set as default shell.
      if ! grep -q "$NIX_ZSH_PATH" /etc/shells; then
        echo "$NIX_ZSH_PATH" | sudo tee -a /etc/shells
      fi
      sudo chsh -s "$NIX_ZSH_PATH" "$(whoami)"

      cat << 'EOF' > ~/.config/systemd/user/meridian.service
      [Unit]
      Description=Meridian Proxy Daemon
      After=network.target

      [Service]
      WorkingDirectory=%h/.local/share/devenv
      Type=simple
      ExecStartPre=docker buildx build . --tag=meridian-proxy -f meridian.Dockerfile
      ExecStart=docker run --rm --name=meridian-proxy -p3456:3456 -vmeridian-proxy:/mnt/claude meridian-proxy
      Restart=on-failure
      RestartSec=1

      [Install]
      WantedBy=default.target
      EOF

      systemctl --user enable meridian.service

      cat <<'EOF' >> ~/.profile
      export ANTHROPIC_API_KEY=x
      export ANTHROPIC_BASE_URL=http://127.0.0.1:3456
      EOF

      if [[ -f /etc/lima-devenv/provisioned ]]; then exit 0; fi
      sudo usermod -aG docker "$(whoami)"

  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail

      if [[ -f /etc/lima-devenv/provisioned ]]; then exit 0; fi

      tee /etc/profile.d/nix-global.sh <<'EOF'
      if [ -d /nix/var/nix/profiles/default/bin ]; then
        export PATH="/nix/var/nix/profiles/default/bin:$PATH"
      fi
      EOF
      chmod +x /etc/profile.d/nix-global.sh

      mkdir -p /etc/sudoers.d
      tee /etc/sudoers.d/nix <<'EOF'
      Defaults secure_path="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/nix/var/nix/profiles/default/bin"
      EOF
      chmod 0440 /etc/sudoers.d/nix

  - mode: system
    script: |
      #!/bin/bash
      mkdir -p /etc/lima-devenv/
      echo '1' > /etc/lima-devenv/provisioned
